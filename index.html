<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>BitFarm - Cloud Mining Platform</title>
    <meta name="title" content="BitFarm - Cloud Mining Platform" />
    <meta name="description" content="Start cloud mining with BitFarm and earn daily payouts. Join today and start growing your digital assets!" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BitFarm - Cloud Mining Platform" />
    <meta property="og:description" content="Start cloud mining with BitFarm and earn daily payouts. Join today and start growing your digital assets!" />
    <meta property="og:site_name" content="BitFarm" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.padding = '20px';
        errorDiv.style.color = 'red';
        errorDiv.style.background = 'black';
        errorDiv.style.minHeight = '100vh';
        errorDiv.style.position = 'absolute';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.zIndex = '9999';
        errorDiv.innerHTML = '<h1>Global Error</h1><pre>' + message + '\n' + (error ? error.stack : '') + '</pre>';
        document.body.appendChild(errorDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        const errorDiv = document.createElement('div');
        errorDiv.style.padding = '20px';
        errorDiv.style.color = 'orange';
        errorDiv.style.background = 'black';
        errorDiv.style.minHeight = '100vh';
        errorDiv.style.position = 'absolute';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.zIndex = '9999';
        errorDiv.innerHTML = '<h1>Unhandled Promise Rejection</h1><pre>' + (event.reason ? (event.reason.message || event.reason) + '\n' + event.reason.stack : '') + '</pre>';
        document.body.appendChild(errorDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
